name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  lint:
    runs-on: ubuntu-latest
    name: "Run lint"
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24.x
        cache: 'npm'
    - run: npm install
    - run: npm run lint
  test:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      id-token: write
    env:
      TEST_TIME_FACTOR: 10.0
    strategy:
      matrix:
        node-version: [20.x]
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm install
    - run: npm run build
    - run: npm run coverage -- --runInBand
    - name: Upload coverage to Codecov
      if: success()
      uses: codecov/codecov-action@v6
      with:
        files: ./coverage/lcov.info
        use_oidc: true
        fail_ci_if_error: true
